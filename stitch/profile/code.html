<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#1754cf',
            surface: '#F9FAFB',
            card: '#FFFFFF',
          },
          fontFamily: {
            sans: ['Manrope', 'sans-serif'],
            display: ['Manrope', 'sans-serif'],
          },
          borderRadius: {
            'custom': '8px',
          }
        }
      }
    }</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-sans text-slate-900 min-h-screen bg-surface">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden max-w-md mx-auto">
<!-- Header -->
<div class="flex items-center justify-between px-6 pt-12 pb-6">
<button class="flex items-center justify-center size-10 rounded-full bg-slate-100 dark:bg-slate-800/50">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">arrow_back</span>
</button>
<h1 class="text-xl font-semibold tracking-tight">Профиль</h1>
<div class="size-10"></div> <!-- Spacer for balance -->
</div>
<!-- Profile Hero Section -->
<div class="flex flex-col items-center px-6 py-8">
<div class="relative group">
<div class="size-32 rounded-full p-1 bg-blue-50 border-2 border-primary/20 flex items-center justify-center">
<div class="w-full h-full rounded-full bg-background-light dark:bg-background-dark p-1">
<div class="w-full h-full rounded-full bg-cover bg-center" data-alt="User profile avatar placeholder circle" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBjPnt_lxQ6_G0ai1nR8jUDwwZsk2ornq7TLAnlIF7Jw0at0X-pfuBrd8qyU1bOCMJVVUyMBOViSloBd5qIbftskVvNef-6d-rNx-pi9I39NSKJ_tzv8Q2vh0oSdUdTG4Piib2Wh-skA173PtwYKqxCSV5Ds8RZCBLqnO3rQEnkw0U3sgW8IIe6HY_xxktFznM5U5zfBYf5nUOHezgjX2oRmrMr3BlYI8_6d4o9uszljAvqTGV5wcKamfhUXD4xdfF7deydpn2bsNfY');">
</div>
</div>
</div>
<button class="absolute bottom-1 right-1 size-8 bg-primary rounded-full flex items-center justify-center text-white shadow-lg border-2 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-sm">edit</span>
</button>
</div>
<div class="mt-6 text-center">
<h2 class="text-2xl font-bold tracking-tight">@username</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium mt-1">Премиум аккаунт</p>
</div>
</div>
<!-- Settings Section -->
<div class="flex-1 px-6 mt-4">
<p class="text-[11px] uppercase tracking-[0.2em] font-bold text-slate-400 dark:text-slate-500 mb-4 ml-1">Настройки интерфейса</p>
<div class="space-y-2">
<!-- Notification Toggle -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/30 rounded-2xl border border-slate-100 dark:border-slate-800/50">
<div class="flex items-center gap-4">
<div class="size-10 rounded-xl bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">notifications</span>
</div>
<span class="font-medium text-[15px]">Уведомления</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Dark Mode Toggle -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/30 rounded-2xl border border-slate-100 dark:border-slate-800/50">
<div class="flex items-center gap-4">
<div class="size-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">dark_mode</span>
</div>
<span class="font-medium text-[15px]">Темная тема</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Language Selection (Mockup) -->
<div class="flex items-center justify-between p-4 bg-white dark:bg-slate-800/30 rounded-2xl border border-slate-100 dark:border-slate-800/50">
<div class="flex items-center gap-4">
<div class="size-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">language</span>
</div>
<span class="font-medium text-[15px]">Язык</span>
</div>
<div class="flex items-center gap-2 text-slate-400">
<span class="text-sm">Русский</span>
<span class="material-symbols-outlined text-lg">chevron_right</span>
</div>
</div>
</div>
<!-- Support Button -->
<button class="w-full mt-10 py-4 px-6 flex items-center justify-center gap-2 rounded-2xl border border-dashed border-slate-200 dark:border-slate-800 text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800/20 transition-colors">
<span class="material-symbols-outlined text-xl">help_outline</span>
<span class="font-medium">Служба поддержки</span>
</button>
</div>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-100 px-16 py-4 flex justify-between items-center" data-purpose="bottom-nav">
<div class="flex flex-col items-center space-y-1 text-slate-300">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9h.01M10 14h3m-3 4h3m-6 0h.01" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold uppercase tracking-widest">Журнал</span>
</div>
<div class="flex flex-col items-center space-y-1 text-primary">
<svg class="h-6 w-6" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-bold uppercase tracking-widest">Профиль</span>
</div>
</nav>
</div>
</body></html>
